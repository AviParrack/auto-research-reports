- term: "Idiot index"
  symbol: "I"
  category: "metric"
  definition: "Ratio of a product's cost (or market value) to the cost of its raw material inputs: \\( I = C_\\text{product} / C_\\text{raw} \\). A high value signals large headroom — you are far from the fundamental material cost floor. (After Elon Musk.)"
- term: "Energetic idiot index"
  symbol: "I_E"
  category: "metric"
  definition: "Ratio of the actual cradle-to-gate energy to make a unit to the thermodynamic floor for the same atoms: \\( I_E = E_\\text{actual} / E_\\text{floor} \\). The joules-based, industrial-explosion analog of the idiot index."
- term: "Unit of analysis"
  category: "method"
  definition: "The single physical unit everything is normalized to (here: one 300 mm leading-edge logic wafer). Locking the unit is what makes the Sankey conserve and the indices comparable."
- term: "Cradle-to-gate"
  category: "method"
  definition: "System boundary from raw material extraction through to the factory gate (a finished die), excluding distribution and use-phase."
- term: "Thermodynamic floor"
  symbol: "E_floor"
  category: "physics"
  definition: "The minimum energy physics demands to produce a unit — e.g. the free energy of separation/reduction for the material content. The denominator of the energetic idiot index."

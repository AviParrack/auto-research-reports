# Bill of materials / input decomposition for a leading-edge logic chip.
# Each row: what fraction of the final product it represents, by mass and by
# value, and where it sits in the stack. SCAFFOLD placeholders pending swarm.
# pct_of_value is the headline "idiot index" intuition: raw materials are a
# vanishing fraction of final value.

- id: in-quartz
  component: "High-purity quartz (SiO₂)"
  stage: raw-material
  pct_of_mass: "~40% of input mass"
  pct_of_value: "<0.1% of final value"
  evidence: { estimate: true, note: "Scaffold: silicon is most of the die mass but trivial cost." }
- id: in-dopants
  component: "Dopants (B, P, As) + epitaxial layers"
  stage: materials
  pct_of_mass: "<0.01% of mass"
  pct_of_value: "small"
  evidence: { estimate: true, note: "Scaffold." }
- id: in-photoresist
  component: "EUV photoresist + ancillary chemicals"
  stage: materials
  pct_of_mass: "consumable"
  pct_of_value: "~3–6% of wafer cost"
  evidence: { estimate: true, note: "Scaffold: specialty chemicals, high $/L, low mass." }
- id: in-gases
  component: "Specialty / bulk gases (incl. neon for lasers)"
  stage: materials
  pct_of_mass: "consumable"
  pct_of_value: "~1–3% of wafer cost"
  evidence: { estimate: true, note: "Scaffold." }
- id: in-litho
  component: "EUV lithography (amortized capital)"
  stage: equipment
  pct_of_mass: "n/a (capital)"
  pct_of_value: "~25–35% of wafer cost"
  evidence: { source: asml-annual-report-2024, ref: "euv-systems-shipped", note: "Scaffold split of amortized tool cost." }
- id: in-energy
  component: "Electricity + ultrapure water + cleanroom"
  stage: fab
  pct_of_mass: "n/a"
  pct_of_value: "~5–10% of wafer cost"
  evidence: { estimate: true, note: "Scaffold: fab energy + utilities." }
- id: in-labor-yield
  component: "Process / labor / yield loss (value-add)"
  stage: fab
  pct_of_mass: "n/a"
  pct_of_value: "balance (dominant)"
  evidence: { estimate: true, note: "Scaffold: process know-how + yield is the real cost." }

# Musk's idiot index = (cost / value of finished product) ÷ (cost of raw inputs).
# A high number means you are far from the fundamental material cost floor —
# i.e. there is room to improve. Each numerator and denominator carries its own
# citation-or-estimate. SCAFFOLD placeholders pending the auto-model swarm.
#
# Discipline (auto-research P2): the denominator is derived from raw-material
# floors with quoted prices SEALED, then reconciled — so the ratio is a genuine
# model-vs-reality gap, not a borrowed figure.

- id: ii-packaged-die
  product: "Packaged leading-edge logic die (GPU-class)"
  entity: nvidia
  numerator:
    label: "Finished die value"
    value_usd: 18000
    evidence: { estimate: true, note: "Scaffold: per-die share of value added across the chain." }

notes: "Pass 1 (2026-06-21): extended from scaffold with a 6-agent research swarm. ~58 real sources in References; key figures (wafer ASP, blank wafer, EUV economics, HBM/CoWoS, market series, thermodynamic floor) are cited. Remaining estimates are labelled."

summary:
  - key: max_global_throughput
    label: "Leading-edge throughput"
    value: "~12–13 M wafers / yr"
    note: "TSMC shipped 12.9 M 12-inch-equiv wafers in 2024 (cited); leading-edge is a high-value subset."
  - key: total_chain_value
    label: "Chain value"
    value: "$200 → $18k → ~$30k+"
    note: "Blank wafer ~$200 → patterned 3nm wafer ~$18k → finished accelerator ~$30k+ (with HBM + packaging)."
  - key: top_idiot_index
    label: "Top idiot index"
    value: "~60,000×"
    note: "3nm wafer ASP ($18k) ÷ the raw silicon atoms in it (~$0.30). Far from the material floor."
  - key: top_energetic_index
    label: "Energetic idiot index"
    value: "~2,300×"
    note: "Full-stack energy/wafer (~2 MWh) ÷ thermodynamic floor (3.1 MJ). Purification alone is ~78,000×."

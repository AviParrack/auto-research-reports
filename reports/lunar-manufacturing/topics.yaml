  artemis-mass-budget:
    description: "NASA Artemis-era cargo / mass requirements 2028-2040 — lander capacity gap, Gateway logistics, surface habitat."
    leaves: [q6-orbital-demand, q5-capital-buildup]
  mars-architecture-mass:
    description: "Mars architecture cargo mass — Starship cadence per launch window, total tonnage, refueling architecture."
    leaves: [q6-orbital-demand]
  satellite-servicing:
    description: "On-orbit satellite servicing market size and mass requirements (refueling, ADR, robotic, assembly)."
    leaves: [q6-orbital-demand]
  debris-mitigation-mass:
    description: "Active debris removal and orbital congestion mass implications; ESA Zero Debris by 2030."

  - id: q4-gear-ratio
    parent: root
    depth: 1
    type: leaf
    question: "What capital-mass-to-product-mass ratio (Metzger's gear ratio) must lunar capital achieve for economic viability, and is this attainable with realistic ISRU technology?"
    status: answered
    answer: "Approximately 35× φ-threshold for absolute advantage at GTO under Metzger's mid-range. LEO structurally harder (Γ ≈ 14 chemical, ≈ 1 with SEP). Tent sublimation (φ = 442-534 in published TEAs) exceeds the threshold by an order of magnitude; strip mining clusters at or near it. Threshold is model-contingent, not universal physics. Industrial-explosion / TAI automation compressing capital mass puts even pessimistic ISRU technologies far above threshold."

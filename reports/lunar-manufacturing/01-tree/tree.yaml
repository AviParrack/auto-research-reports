root:
  id: root
  question: "When does lunar surface manufacturing become cheaper than Earth launch for orbital infrastructure?"
  answer: "Under TAI-grade compression — and only there — on two independent legs: (1) cost: mass-driver+SEP $50/kg vs optimistic-late Starship $59/kg, with the cycle-life gap (5-7 OOM beyond demonstrated) as binding engineering risk; (2) throughput necessity: TAI-C SDC demand 10× Earth-launch ceiling, lunar bulk mass architecturally necessary for ~50% of SDC mass budget. Under BAU, neither leg holds (mass driver doesn't reach scale; demand fits inside Earth-launch capacity). Under stall, demand fails entirely. The framework is the deliverable; the headline number is conditional on the regime obtaining. Synthesis at 03-synthesis/v1/."
  status: answered


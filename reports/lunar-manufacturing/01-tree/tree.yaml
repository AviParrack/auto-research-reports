    question: "What is the projected demand for structural mass and propellant in LEO and cislunar space 2026-2040, split by use case (data centers, solar power, depots, deep-space missions)?"
    status: answered
    answer: "Demand spans three orders of magnitude across regimes: stall ~20kt cumulative, BAU ~2.15Mt, TAI-C ~42.9Mt. SDC dominates at ~93% under BAU and TAI-C (mass intensity ~40 t/MW continuous compute). Under TAI-C, SDC demand alone (~2.67 Mt/yr) exceeds plausible Earth-launch throughput (~400 kt/yr) by 10×, making lunar bulk mass architecturally necessary for ~50% of SDC mass budget; the other ~50% (compute hardware) stays Earth-launch-bound. Stall regime fails the lunar manufacturing thesis for lack of demand."

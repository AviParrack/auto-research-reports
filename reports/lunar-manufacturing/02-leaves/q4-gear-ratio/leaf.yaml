id: q4-gear-ratio
question: "What capital-mass-to-product-mass ratio (Metzger's gear ratio) must lunar capital achieve for economic viability, and is this attainable with realistic ISRU technology?"
status: reviewed
answer: "Approximately 35× for absolute advantage at GTO under Metzger's mid-range parameters, with comparable thresholds for closer cislunar destinations. LEO is structurally harder (Γ ≈ 14 chemical, ≈ 1 with SEP). Tent sublimation (φ = 442-534 in published TEAs) exceeds the threshold by an order of magnitude; strip mining clusters at or near threshold. The threshold is model-contingent, not a universal physics constant. Industrial-explosion / TAI-grade automation compressing capital mass would put even pessimistic ISRU technologies far above threshold."

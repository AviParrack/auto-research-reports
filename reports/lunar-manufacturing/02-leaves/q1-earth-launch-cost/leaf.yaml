id: q1-earth-launch-cost
question: "What is the projected cost per kg to LEO from Earth launch over 2026-2040, with realistic uncertainty bands?"
status: reviewed
answer: "Three operational scenarios bracket Starship cost-per-kg to LEO: optimistic ($59-277/kg internal cost), partial ($107-466/kg, demonstrated by B1076 34-reuse milestone), pessimistic ($194-878/kg). The dominant variable is refurbishment rate, not hardware amortization. Musk's $10/kg target sits outside the calc envelope unless TAI-grade compression AND zero-margin pricing both occur. SatBase 2026 evidence shows Falcon 9 list prices rising at $500/kg/year — Starship has not yet pulled market prices down. Citigroup $100/kg by 2040 fits the optimistic-late corner."

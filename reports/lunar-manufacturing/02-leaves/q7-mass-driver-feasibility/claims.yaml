      audit_file: passes/pass-02-audit.md
    human:
      status: unnoted

- id: q7.c3
  text: "Net system efficiency for a lunar mass driver is bounded by the demonstrated range: 22% (DARPA 45-stage coilgun, modern Earth-tested) at the low end to 90% (Handmer 2026 engineer-advocate optimistic). The 96% claimed in 1979 NASA SP-428 is electromagnetic-conversion-only, not net system efficiency. A conservative low-end-of-aspirational midpoint of 50% gives wall energy 2.82 MJ/kg at 1.7 km/s and 5.64 MJ/kg at 2.4 km/s."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: medium
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: flagged
      audit_file: passes/pass-02-audit.md
      notes: "Codex flagged that 'engineering ceiling' is too strong a label; sensitivity range is the right framing. Calc updated. Codex also flagged eta=0.50 as not the arithmetic midpoint of 0.33 and 0.90; reframed as 'conservative low-end-of-aspirational.'"
    human:
      status: unnoted


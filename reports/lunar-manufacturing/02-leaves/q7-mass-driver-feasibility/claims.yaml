- id: q7.c1
  text: "Lunar escape velocity is 2,375 m/s and lunar low orbit (LLO) circular speed is 1,679 m/s, derived from the lunar mass (7.342e22 kg) and radius (1,737.4 km) via v_esc = sqrt(2GM/R) and v_orbit = sqrt(GM/R). Mascon-anomaly-assisted designs (Janhunen 2024) can catch projectiles launched at LLO speed (1.7 km/s) rather than escape (2.4 km/s), reducing kinetic energy per kg by ~50% (1.41 MJ/kg vs 2.82 MJ/kg)."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: high
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: passed
      audit_file: passes/pass-02-audit.md
      notes: "Codex accepted the kinematics; minor flag that 'LLO speed' is slightly imprecise (surface circular vs nonzero altitude)."
    human:
      status: unnoted

- id: q7.c2
  text: "Constant-acceleration kinematics fix the track-length × acceleration trade: for v=1.7 km/s, a 1000g profile requires 144 m, 100g requires 1.4 km, 20g requires 7.2 km; for v=2.4 km/s, lengths roughly double. This is the inescapable physical trade between track length and projectile g-loading."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: high
  derivation_path: passes/pass-02-calc.md
  audit:

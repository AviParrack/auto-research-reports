- id: q7.c10
  text: "Cycle-life gap is the most under-discussed engineering risk in the mass-driver literature. At 1 Mt/yr × 200 kg/shot × 20 yr the system requires approximately 100 million shots; at 10 Mt/yr (q2's nameplate) approximately 1 billion shots. State-of-art demonstrated cycle life for EM launchers is approximately 100-1,000 shots; the Navy EMRG program was cancelled in 2021 after roughly $500M investment with cycle-life and barrel-wear as the binding failure modes. The 5-7 orders of magnitude gap between demonstrated and required cycle life is independent of capital cost and TAI compression; it requires an engineering breakthrough to close."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: medium-high
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: passed
      audit_file: passes/pass-02-audit.md
      notes: "Codex surfaced this in audit as the highest-severity load-bearing risk in the calc. Accepted and added as q7.c10."
    human:
      status: unnoted


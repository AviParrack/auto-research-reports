  text: "Published lunar capex anchors span approximately three orders of magnitude ($1.5B Zubrin Moon Direct to $1T+ Handmer mature industry), but the spread is explained by scope (product class, milestone, transport architecture) rather than analytical disagreement. When normalized to the same scope, the analytical disagreement between credible sources is approximately 2-4x, which is the expected range for an early-stage area of engineering economics. None of the seven published anchors directly cross-validates our BAU $150-400B figure at the same scope; our calc is the only first-principles full-scope estimate in this corpus for a net-positive-export base."
  type: derived

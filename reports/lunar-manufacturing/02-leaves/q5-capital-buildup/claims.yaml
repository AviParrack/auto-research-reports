- id: q5.c14
  text: "Metzger et al. 2013 'Affordable, Rapid Bootstrapping' models that 12 metric tons landed on the Moon over approximately 20 years can seed a self-sustaining industrial endpoint of 156 MT (60 humanoid robots) or up to 40,000 MT (100,000 humanoid robots) under accelerated launch cadence (41 MT total Earth-launched). The bootstrap mechanism is the generation scheme (Gen 1.0 to Gen 6.0) in which the seed produces successively less-crude lunar-made hardware until electronics reach 90 percent lunar-made by Gen 3.0 and 100 percent by Gen 6.0. Metzger does not assess development cost. This framework is consistent with the industrial-explosion regime's 10x Earth-launched mass compression but does not validate cost compression to the same degree."
  type: factual
  evidence:
    - source: metzger-2013-bootstrap
      ref: seed-mass-12t-20yr
      verdict: supports
    - source: metzger-2013-bootstrap
      ref: terminal-mass-156t-60robots
      verdict: supports
  confidence: high
  audit:
    gpt:
      status: passed
      audit_file: passes/pass-03-audit.md
      notes: "Codex confirmed Metzger really does model 41 MT total Earth-launched mass and the Gen 3+ electronics local-production assumption supports mass compression direction; cost compression is not validated (development cost, failure realism, supply-chain closure excluded)."
    human:
      status: unnoted
      comment_file: null


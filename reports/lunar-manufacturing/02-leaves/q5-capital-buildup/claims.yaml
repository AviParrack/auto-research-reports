- id: q5.c1
  text: "A minimum net-positive-export lunar manufacturing base has a first-principles one-set capital mass in the range approximately 311-500 t. The lower bound is the calc-baseline composition (habitat 25 t + 500 kWe fission power 125 t + ISRU plant 75 t + mobility 31.5 t + manufacturing complement 40 t + infrastructure 15 t). The upper bound reflects Codex-accepted adjustments to ISRU/mobility/mfg/infra mass budgets (ISRU ~140 kg/(t/yr) pre-redundancy per NIA benchmarks; industrial-scale haulers larger than scout-class; infrastructure not fully counting power distribution, cryogenic storage, thermal control)."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: medium
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: flagged
      audit_file: passes/pass-02-audit.md
      notes: "Codex flagged several sub-components as weak (ISRU high severity; mobility/mfg/infra medium). Amended claim to a 311-500 t range reflecting the criticisms; sub-component breakdown remains as the lower-bound composition."
    human:
      status: unnoted
      comment_file: null


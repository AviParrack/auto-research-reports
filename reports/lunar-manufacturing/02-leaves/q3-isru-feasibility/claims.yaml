- id: q3.c5
  text: "Lunar methane (LCH4) propellant has no native carbon source at bulk scale. Bulk regolith carbon is solar-wind-implanted at ppm levels and not minable for propellant. Polar PSR craters may hold trapped CO and CO2 ices at meaningful local scale, but the resource is prospecting-limited and exhaustible. LCH4 is therefore not a bulk lunar ISRU product under any acceleration regime; bulk carbon must come from Earth import, asteroid retrieval, or limited polar volatile mining. This is a compositional structural fact, not a TRL question."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.md
      verdict: supports
  confidence: high
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: passed
      audit_file: passes/pass-02-audit.md
      notes: "Codex flagged 'impossible under any regime' as too absolute; softened to 'not a bulk product; polar volatiles may give low-rate local supply'."

- id: q3.c6
  text: "FFC Cambridge molten-salt electrolysis offers the cleanest direct route to refined Al and Ti from anorthite and ilmenite respectively, but requires chlorine for the CaCl2 electrolyte. Chlorine is present only in trace amounts on the lunar surface (apatite, ppm). This makes FFC Cambridge a structurally Earth-import-bound process unless aggressive salt recycling is solved. MRE is preferred for lunar economics on whole-regolith Si + Fe production despite poorer metal separation."

- id: q3.c1
  text: "Lunar regolith contains 41-44% oxygen by mass across mare, highland, and polar regions (derived mare 42.3%, highland 43.8%, polar 43.2% from canonical oxide-phase compositions). Oxygen abundance is regionally consistent; process choice varies with feedstock chemistry (ilmenite content, melt properties, anorthite fraction), so whole-regolith O2 processes are geographically robust but not literally agnostic."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: high
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: passed
      audit_file: passes/pass-02-audit.md
      notes: "Codex confirmed stoichiometry. Tightened from 'geographically agnostic' to 'regionally consistent abundance, process choice varies'."

- id: q3.c2
  text: "The pure-oxide lower bound for whole-regolith molten electrolysis on mare basalt is 6.5 kWh per kg O2, mass-weighted across the dominant oxides (SiO2, Al2O3, FeO, MgO, CaO, TiO2) using Gibbs free energies at 1600 K. This is a thermodynamic floor under ideal Gibbs dissociation; real MRE reactors operate at 5-10x this floor due to melt activities, alloy formation, anode overpotentials, Joule losses, heat-to-melt, and balance-of-plant ancillaries. Wall-plug ranges per process: ilmenite H2 reduction 15-30, carbothermal 50, MRE 60, FFC Cambridge 40, vapor pyrolysis 100-200, polar ice 30-100 kWh/kg O2."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: high
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: passed
      audit_file: passes/pass-02-audit.md
      notes: "Codex confirmed thermo floor arithmetic; widened ilmenite range from 15 to 15-30 per PNAS 2025 model (24.3 +/- 5.8 kWh/kg LOX)."


- id: q3.c8
  text: "TRL trajectory for every ISRU process is acceleration-regime dependent, not calendar-year dependent. Under TAI-compression (compressed demonstration cadence, tight robotic CLPS feedback loop, capital-mass compression), carbothermal and MRE plausibly reach TRL 8 (flight-demo with product return) within a few years of present. Under business-as-usual, the same milestones land roughly a decade later. Under a 50-year-Apollo-drought stall, processes remain at their 2024-2026 baselines indefinitely and no lunar product flow exists. The specific regime rates are illustrative, not derived; the framework is the deliverable for q4/q8 synthesis."

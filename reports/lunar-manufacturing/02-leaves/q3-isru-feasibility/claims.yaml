  text: "Materials feasibility by 2030 under BAU: O2 (high — carbothermal); Fe + Si (high — MRE coproducts); Al (medium — FFC Cambridge contingent on Cl recycling, or MRE Ca/Al fractional separation); Ti (medium — FFC on ilmenite OR coproduct of ilmenite reduction's TiO2 leftover); Mg (low-medium — MRE byproduct, no dedicated route at scale); glass and structural blocks (high — sintering routes). LOX as propellant is high feasibility; LH2 is medium (resource-prospecting-blocked); LCH4 is no-go."

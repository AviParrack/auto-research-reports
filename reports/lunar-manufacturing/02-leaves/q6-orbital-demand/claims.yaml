- id: q6.c6
  text: "Under TAI-compression, SDC mass demand (~2.7 Mt/yr) alone exceeds plausible Earth-launch throughput by approximately an order of magnitude (Earth-launch capacity at ~200 active reusable Starships × 10 flights/yr × 200 t = ~400,000 t/yr). The q1-q6 demand-elasticity-cost coupling implies that lunar-sourced BULK MASS (structure, radiators, silicon for panels, sintered regolith) covers roughly half the SDC mass budget; the other half — compute hardware (GPUs, memory, networking, PSUs) — remains Earth-launch-bound regardless. Lunar manufacturing is therefore architecturally necessary but not sufficient under TAI-C."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: medium
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: flagged
      audit_file: passes/pass-02-audit.md
      notes: "Codex flagged the original 'lunar-sourced mass is necessary' framing as too strong because ~50% of SDC mass is Earth-launch-only compute hardware. Accepted; reframed to bulk-mass-half / compute-half split."


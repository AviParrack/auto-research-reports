- id: q6.c6
  text: "Under TAI-compression, SDC mass demand (~2.7 Mt/yr) alone exceeds plausible Earth-launch throughput by approximately an order of magnitude (Earth-launch capacity at ~200 active reusable Starships × 10 flights/yr × 200 t = ~400,000 t/yr). The q1-q6 demand-elasticity-cost coupling implies that lunar-sourced BULK MASS (structure, radiators, silicon for panels, sintered regolith) covers roughly half the SDC mass budget; the other half — compute hardware (GPUs, memory, networking, PSUs) — remains Earth-launch-bound regardless. Lunar manufacturing is therefore architecturally necessary but not sufficient under TAI-C. The conclusion is conditional on the TAI-C SDC demand scenario obtaining (q6.c2); McCalip's BAU cost-critique does not directly engage with the TAI-C necessity logic."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
    - source: metzger-2023-economics
      ref: demand-elastic-feedback
      verdict: supports

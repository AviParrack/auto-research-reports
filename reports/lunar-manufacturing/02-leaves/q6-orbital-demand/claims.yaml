      ref: spacex-xai-projection
      verdict: supports
    - source: mccalip-quote-fomo
      ref: 1gw-3x-quote
      verdict: contradicts
  confidence: medium
  derivation_path: passes/pass-02-calc.md
  audit:
    gpt:
      status: flagged
      audit_file: passes/pass-03-audit.md
      notes: "Codex flagged (pass-02) the 'lunar-sourced mass is necessary' overclaim. Codex flagged (pass-03) that this is conditional on TAI-C scenario, not a source-settled resolution. Both accepted; conditional framing added."


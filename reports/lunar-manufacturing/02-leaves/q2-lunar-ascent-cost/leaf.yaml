  - "Mass driver $10B capital is my extrapolation, not a Handmer figure. Reactor alone is $2-4B per Handmer; total capital could be 2-4× my assumption. Would shift early-era $/kg by ±$50-100 — small but real."
  - "Vehicle reusability assumption (lunar ascent vehicle amortized as if reusable) doesn't separately model the return-to-Moon leg. Codex flagged as severity-high in pass-02. Trade-press 8-10 reuses for HLS-class supports the mid-era assumption; late-era 50 reuses is optimistic."
  - "Several primary sources accessible only via abstract + secondary summaries (Coutts-Sowers paywalled, Metzger arXiv PDF binary-only, AIAA-4123 paywalled, Lewis NTRS binary-only, Kornuta 2019 OSTI binary). Headline numbers don't depend critically on these but a future source-review with direct primary access would tighten confidence on q2.c10 and q2.c11."

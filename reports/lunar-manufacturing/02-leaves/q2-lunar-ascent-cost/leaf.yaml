id: q2-lunar-ascent-cost
question: "What is the projected cost per kg from lunar surface to LEO over 2026-2040, broken out by chemical rocket vs mass driver delivery?"
status: reviewed
answer: "Lunar-surface-to-LEO cost spans $50–$13,029/kg across realistic aerobraking-included scenarios (chemical Earth-imports-only $1,303–$13,029/kg, chemical aggressive-ISRU $994–$8,912/kg, mass-driver+SEP $50–$528/kg). The architectural choice (aerobraking vs propulsive; mass-driver vs chemical) is more economically consequential than the choice of propellant chemistry. Only mass-driver+SEP at late-era throughput closes within a factor of 2 of q1's optimistic-late Starship cost ($50 vs $59/kg). Late-era Earth-imports approaches aggressive-ISRU within ~$300/kg due to falling terrestrial L_p; in practice ISRU's competitiveness requires production cost below the gear-ratio-amplified Earth-imports floor. Strong agreement with trade-press evidence ([orbital-refueling-newspaceeconomy] $4,000/kg matches calc $4,162/kg)."

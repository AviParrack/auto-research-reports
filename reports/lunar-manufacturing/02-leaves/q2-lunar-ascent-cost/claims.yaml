- id: q2.c8
  text: "Lunar-surface-to-LEO cost is roughly 9-50× higher than terrestrial Earth-to-LEO cost (q1's L_p) across all chemical scenarios. q1's partial-mid L_p is $107/kg; q2's partial-ISRU mid is $5,191/kg — a 48× multiple. Aggressive-ISRU late ($994/kg) is approximately 9× q1's partial-late ($107/kg) and 17× q1's optimistic-late ($59/kg). Mass-driver late ($50/kg) is the only architecture that closes the multiple to within a factor of 2 of optimistic-late Starship. This is the structural framing for the report: lunar manufacturing for orbital infrastructure requires mature ISRU + mass driver, or products with high enough value density that shipping cost is not binding."
  type: derived
  evidence:
    - source: first-principles-calc
      ref: pass-02-calc.py
      verdict: supports
  confidence: high
  derivation_path: passes/pass-02-calc.md

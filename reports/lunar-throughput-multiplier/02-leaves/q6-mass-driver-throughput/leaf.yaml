id: q6-mass-driver-throughput
question: "What is the throughput ceiling of a mature lunar mass-driver architecture — first-principles power → kg/s for a single driver (accounting for duty cycle, cycle-life, thermal dissipation in vacuum, payload g-load tolerance), and what happens when the cycle-life or thermal limit on a single driver is reached and the response is to build N parallel drivers? Anchor against Casey Handmer (May 2026) and the NASA SP-428 / O'Neill lineage. Briefly assess whether catcher/receiver infrastructure at the destination is a paired binding constraint, or whether self-propelled payloads route around it."

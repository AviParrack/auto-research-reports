# Claim graph for q1-earth-industrial-ceiling.
# Every prose statement in the leaf write-up must trace to a claim id here.
# Claims are typed: factual (from sources), derived (from calc), estimate.

- id: q1.c1
  text: "LOX is the first input to exceed current US industrial-oxygen production at modest rocket cadences (~120 launches/yr at 5% of US O2; ~2,330 launches/yr at 100% of US O2). But this is a demand-observation, not a supply ceiling: LOX production scales to any cadence given electricity and capital, since the atmospheric O2 feedstock is unlimited and the Carnot-limit minimum work of air separation (~51 kWh/t O2) leaves substantial headroom above the current ~200 kWh/t practical efficiency. LOX is willingness-to-scale, not fundamentally binding."
  type: derived
  evidence:
    - source: sdc-cadence-anchor-internal
      ref: lox-binding-thresholds
      verdict: supports
    - source: air-liquide-baytown-2024
      ref: baytown-asu-capacity
      verdict: supports
    - source: thunder-said-energy-asu
      ref: asu-energy-range
      verdict: supports
    - source: epa-o2-supply-chain-2023
      ref: us-o2-production-2019
      verdict: supports
    - source: asu-thermodynamic-minimum
      ref: carnot-minimum-air-separation
      verdict: supports
  confidence: high
  derivation_path: passes/pass-02-calc.md
  revised_in: passes/pass-02b-recalc.md
  audit:
    gpt:
      status: flagged-resolved
      audit_file: passes/pass-02-audit.md
      notes: "Codex flagged caveat about merchant LOX vs industrial O2. Avi pushed back further: 'current industry size' is demand-observation, not supply ceiling. q1.c1 reframed in pass-02b-recalc.md to distinguish demand-observation from fundamental constraint."
    human:
      status: noted
      comment: "Avi 2026-06-08: pushed back on framing; LOX is willingness-to-scale, not fundamental."


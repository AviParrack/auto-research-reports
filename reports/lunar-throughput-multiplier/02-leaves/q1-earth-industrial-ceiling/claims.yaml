      comment: "Avi 2026-06-08: 'we need to know, brass tacks: are there fundamental limits to your ability to scale this up?' Reframing was the right move."

- id: q1.c8
  text: "Earth chemical-rocket throughput has three regime-distinct ceilings: (1) Near-term current-architecture: ~10-100 kt/yr LEO (~100-1,000 launches/yr) bounded by current LOX merchant capacity + current pads + helium for COPV-style flight pressurisation. (2) Capital-scaled-out current-architecture: ~1-10 Mt/yr LEO (~10⁴-10⁵ launches/yr) bounded by pad geography (50-100 mature global pads × 1-3 launches/day). (3) Architecture-redesigned (offshore pads, autogenous GSE, civilisation-scale ASU electricity): ~10-100 Mt/yr LEO at 10⁵-10⁶ launches/yr, bounded by atmospheric chemistry (q2 territory) and ASU electricity supply. All three bands are *capital-feasible* given sufficient time; the truly load-bearing constraint at the upper end is atmospheric, not industrial."
  type: derived
  evidence:

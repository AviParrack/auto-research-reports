      audit_file: passes/pass-02-audit.md
      notes: "Codex flagged: original draft conflated 10⁸ t/yr and 10⁹ t/yr scales. Rewritten with per-scale numbers correct."

- id: q1.c9
  text: "Earth chemical-rocket launch at Tt/yr (10⁹ t/yr) LEO is not categorically impossible from industrial-input considerations alone. It requires: (a) civilisation-scale electricity build-out for ASUs (~7-44% of current global generation depending on ASU efficiency, with the Carnot floor at 7.5%); (b) autogenous-GSE helium-architecture redesign to eliminate the ground-system helium bottleneck; (c) pad-architecture innovation (~10⁴ pads or offshore-platform proliferation); and (d) atmospheric chemistry NOT binding before this scale — the actually-binding question, which lives in q2. Whether the Moon is architecturally necessary for cosmic throughput rests primarily on q2's atmospheric ceiling, not on q1's industrial inputs."

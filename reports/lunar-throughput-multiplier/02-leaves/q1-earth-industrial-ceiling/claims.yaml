- id: q1.c7
  text: "Distinguish two orderings. (a) Willingness-to-scale ordering at current capital + architecture: LOX → engines → pads → ASU electricity → methane → steel-reusable. These are demand-observations against current industry size, not fundamental ceilings. (b) FUNDAMENTAL-constraint ordering — constraints that bite even with infinite capital + lead-time: helium (in current GSE architecture) at ~few thousand launches/yr → pad geography ~10⁴-10⁵ launches/yr → ASU electricity at SOTA efficiency at ~10⁷ launches/yr (≈30% of current global electricity) → atmospheric chemistry (q2 territory, likely binds before any of these). Industrial inputs (LOX, methane, engines, steel) are willingness-to-scale, not fundamentally binding."
  type: derived
  evidence:
    - source: sdc-cadence-anchor-internal
      ref: lox-binding-thresholds
      verdict: supports

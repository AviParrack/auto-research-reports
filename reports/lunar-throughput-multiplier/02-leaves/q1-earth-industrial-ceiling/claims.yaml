  text: "Launch pad geographic suitability is fundamentally constrained, not willingness-to-scale. Suitable sites require equatorial proximity (for rotational velocity bonus), coastal location with downrange ocean (for safety), and low population density. Current global active launch sites ~30; plausible mature global pad count 50-100. At 1-3 launches/pad/day, pad-geography ceiling sits at 18,000-110,000 launches/yr (≈1.8-11 Mt/yr LEO at 100 t/launch). To exceed this requires offshore platform proliferation (new infrastructure class) or air-launch architectures (low TRL)."

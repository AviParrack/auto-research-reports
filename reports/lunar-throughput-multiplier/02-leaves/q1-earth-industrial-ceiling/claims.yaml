- id: q1.c14
  text: "Helium is the only Earth-side industrial input fundamentally constrained at high rocket cadence in the current GSE architecture. Global production is ~32 kt/yr (190 million m^3); non-renewable; geographically concentrated (US 38%, Qatar 21%, Algeria 11%). Falcon 9 uses 14-18% of daily world helium per ignition for COPV pressurisation; Starship's autogenous methane/O2 pressurisation eliminates this for flight, but ground-system helium (purge, leak testing, GSE pneumatics) remains. At 1 t GSE-helium per Starship launch and 10^7 launches/yr (Tt/yr cosmic scale), demand is ~312x current global supply. The helium constraint is partly architecture-dependent: an autogenous-GSE redesign could in principle eliminate it."
  type: derived
  evidence:
    - source: helium-supply-2025
      ref: helium-global-production-2025
      verdict: supports
    - source: helium-supply-2025
      ref: falcon9-helium-per-launch
      verdict: supports

  - id: q6-mass-driver-throughput
    parent: root
    depth: 1
    type: leaf
    question: "What is the throughput ceiling of a mature lunar mass-driver architecture — first-principles power → kg/s for a single driver (accounting for duty cycle, cycle-life, thermal dissipation in vacuum, payload g-load tolerance), and what happens when the cycle-life or thermal limit on a single driver is reached and the response is to build N parallel drivers? Anchor against Casey Handmer (May 2026) and the NASA SP-428 / O'Neill lineage. Briefly assess whether catcher/receiver infrastructure at the destination is a paired binding constraint, or whether self-propelled payloads route around it."
    status: open
    answer: null
    confidence: null
    leaf_path: 02-leaves/q6-mass-driver-throughput/
    created_by: agent
    created_pass: 0
    last_touched_pass: 2
    children: []
    notes_for_leaf_pass:
      - "Parallelization is a load-bearing argument: single-driver cycle-life is bounded; build five (or fifty) drivers to multiply throughput. The single-driver number is a unit, not a ceiling."
      - "Casey Handmer's May 2026 post emphasises pulsed power buffer, switches, thermal loop as the main machine; rail is secondary. Use as primary anchor."
      - "Catcher/receiver discussion: cover briefly (1-2 paragraphs). The alternative is mass-driver-launched payloads that carry their own propulsion (ion / chemical / NTR) for capture. Defer to q3 for the propulsion-class analysis."

